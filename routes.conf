# Reverse proxy routing rules
# Format: METHOD PATH TARGET_URL
# Use * as method to match all HTTP methods
# Use :param for path parameters (forwarded as-is)

GET   /api/users        http://localhost:3000/users
GET   /api/users/:id    http://localhost:3000/users/:id
GET   /api/posts        http://localhost:3000/posts
GET   /api/posts/:id    http://localhost:3000/posts/:id

# Blocked routes (target = DENY)
*     /admin            DENY
